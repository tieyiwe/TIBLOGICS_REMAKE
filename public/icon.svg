<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#F9C642"/>
      <stop offset="40%"  stop-color="#FA8C3A"/>
      <stop offset="100%" stop-color="#F94040"/>
    </linearGradient>
  </defs>

  <!-- Edges -->
  <g stroke="url(#g)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="90"  y1="248" x2="168" y2="272"/>
    <line x1="168" y1="272" x2="148" y2="185"/>
    <line x1="168" y1="272" x2="240" y2="220"/>
    <line x1="168" y1="272" x2="195" y2="345"/>
    <line x1="148" y1="185" x2="240" y2="220"/>
    <line x1="148" y1="185" x2="252" y2="148"/>
    <line x1="240" y1="220" x2="195" y2="345"/>
    <line x1="240" y1="220" x2="330" y2="295"/>
    <line x1="195" y1="345" x2="270" y2="368"/>
    <line x1="330" y1="295" x2="270" y2="368"/>
    <line x1="330" y1="295" x2="415" y2="218"/>
    <line x1="330" y1="295" x2="400" y2="358"/>
    <line x1="415" y1="218" x2="432" y2="148"/>
    <line x1="415" y1="218" x2="460" y2="280"/>
  </g>

  <!-- Nodes -->
  <!-- Small endpoints -->
  <circle cx="90"  cy="248" r="16" fill="#F9C642"/>
  <circle cx="252" cy="148" r="16" fill="#F9B83C"/>
  <circle cx="270" cy="368" r="16" fill="#FA7040"/>
  <circle cx="432" cy="148" r="14" fill="#F96040"/>
  <circle cx="460" cy="280" r="14" fill="#F94844"/>
  <circle cx="400" cy="358" r="14" fill="#F94040"/>

  <!-- Medium nodes -->
  <circle cx="148" cy="185" r="24" fill="#F9B038"/>
  <circle cx="195" cy="345" r="22" fill="#FA8040"/>
  <circle cx="415" cy="218" r="26" fill="#F95040"/>

  <!-- Large hub nodes -->
  <circle cx="240" cy="220" r="32" fill="#FA9038"/>
  <circle cx="330" cy="295" r="38" fill="#FA6840"/>

  <!-- Central largest node -->
  <circle cx="168" cy="272" r="46" fill="#FA9C3A"/>
</svg>
