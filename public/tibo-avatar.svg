<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#162B52"/>

  <!-- Suit jacket body -->
  <path d="M 4 100 L 22 68 L 40 80 L 50 100 Z" fill="#0C1A30"/>
  <path d="M 96 100 L 78 68 L 60 80 L 50 100 Z" fill="#0C1A30"/>

  <!-- Jacket facing / lapels -->
  <path d="M 40 80 L 50 74 L 50 100 L 20 100 Z" fill="#142240"/>
  <path d="M 60 80 L 50 74 L 50 100 L 80 100 Z" fill="#142240"/>

  <!-- White shirt -->
  <path d="M 41 72 L 50 78 L 59 72 L 56 84 L 50 87 L 44 84 Z" fill="#ECF1F8"/>

  <!-- Orange tie -->
  <path d="M 48 75 L 50 78 L 52 75 L 50.5 85 L 50 87 L 49.5 85 Z" fill="#F47C20"/>

  <!-- Neck -->
  <rect x="45" y="63" width="10" height="13" rx="4" fill="#B5784E"/>

  <!-- Face -->
  <ellipse cx="50" cy="46" rx="19" ry="21" fill="#C48A5E"/>

  <!-- Hair — close cut, sharp line -->
  <ellipse cx="50" cy="29" rx="19" ry="11" fill="#160800"/>
  <rect x="31" y="29" width="38" height="10" fill="#160800"/>
  <!-- Hairline taper -->
  <path d="M 31 34 Q 31 25 50 24 Q 69 25 69 34 Q 65 27 50 26 Q 35 27 31 34 Z" fill="#160800"/>

  <!-- Fade sides -->
  <rect x="31" y="34" width="6" height="20" rx="3" fill="#1E0B02" opacity="0.7"/>
  <rect x="63" y="34" width="6" height="20" rx="3" fill="#1E0B02" opacity="0.7"/>

  <!-- Ears -->
  <ellipse cx="31" cy="48" rx="3.5" ry="5.5" fill="#B5784E"/>
  <ellipse cx="69" cy="48" rx="3.5" ry="5.5" fill="#A56840"/>

  <!-- Left eye -->
  <ellipse cx="42" cy="45" rx="5.5" ry="4.5" fill="white"/>
  <circle cx="42.5" cy="45.5" r="3.3" fill="#160800"/>
  <circle cx="41.3" cy="44.3" r="1.1" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="58" cy="45" rx="5.5" ry="4.5" fill="white"/>
  <circle cx="57.5" cy="45.5" r="3.3" fill="#160800"/>
  <circle cx="56.3" cy="44.3" r="1.1" fill="white"/>

  <!-- Eyebrows — clean, defined -->
  <path d="M 36 39 Q 42 35.5 48 39" stroke="#160800" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 52 39 Q 58 35.5 64 39" stroke="#160800" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M 50 52 L 47 59 Q 50 61 53 59 Z" fill="#9E6038" opacity="0.45"/>
  <ellipse cx="47.5" cy="60" rx="3" ry="2" fill="#8A5028" opacity="0.35"/>
  <ellipse cx="52.5" cy="60" rx="3" ry="2" fill="#8A5028" opacity="0.35"/>

  <!-- Subtle cheek warmth -->
  <ellipse cx="36" cy="54" rx="6" ry="4" fill="#D09A70" opacity="0.18"/>
  <ellipse cx="64" cy="54" rx="6" ry="4" fill="#D09A70" opacity="0.18"/>

  <!-- Confident closed smile -->
  <path d="M 43 64 Q 50 70 57 64" stroke="#8A5028" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 43 64 Q 50 68 57 64" fill="#C07050" opacity="0.25"/>

  <!-- Subtle short beard (stubble outline) -->
  <path d="M 34 58 Q 36 70 50 74 Q 64 70 66 58 Q 62 65 50 68 Q 38 65 34 58 Z" fill="#A06038" opacity="0.18"/>
</svg>
