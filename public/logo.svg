<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" role="img" aria-label="TIBLOGICS">
  <defs>
    <linearGradient id="ng" x1="50" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4C01A"/>
      <stop offset="40%"  stop-color="#F47C20"/>
      <stop offset="100%" stop-color="#DC4C2E"/>
    </linearGradient>
  </defs>

  <!-- Connections (drawn behind nodes) -->
  <g stroke="url(#ng)" stroke-width="13" fill="none" stroke-linecap="round">
    <line x1="50"  y1="280" x2="165" y2="270"/>
    <line x1="165" y1="270" x2="255" y2="90"/>
    <line x1="165" y1="270" x2="360" y2="210"/>
    <line x1="165" y1="270" x2="340" y2="380"/>
    <line x1="255" y1="90"  x2="360" y2="210"/>
    <line x1="360" y1="210" x2="458" y2="65"/>
    <line x1="360" y1="210" x2="490" y2="315"/>
    <line x1="458" y1="65"  x2="490" y2="315"/>
    <line x1="490" y1="315" x2="548" y2="158"/>
    <line x1="490" y1="315" x2="548" y2="385"/>
    <line x1="548" y1="158" x2="564" y2="80"/>
  </g>

  <!-- Nodes -->
  <circle cx="50"  cy="280" r="12"  fill="url(#ng)"/>
  <circle cx="165" cy="270" r="42"  fill="url(#ng)"/>
  <circle cx="255" cy="90"  r="18"  fill="url(#ng)"/>
  <circle cx="340" cy="380" r="16"  fill="url(#ng)"/>
  <circle cx="360" cy="210" r="27"  fill="url(#ng)"/>
  <circle cx="458" cy="65"  r="14"  fill="url(#ng)"/>
  <circle cx="490" cy="315" r="32"  fill="url(#ng)"/>
  <circle cx="548" cy="158" r="12"  fill="url(#ng)"/>
  <circle cx="548" cy="385" r="11"  fill="url(#ng)"/>
  <circle cx="564" cy="80"  r="9"   fill="url(#ng)"/>
</svg>
