    <line x1="58"  y1="92"  x2="86"  y2="36"/>
    <line x1="58"  y1="92"  x2="119" y2="73"/>
    <line x1="58"  y1="92"  x2="112" y2="126"/>
    <line x1="86"  y1="36"  x2="119" y2="73"/>
    <line x1="119" y1="73"  x2="149" y2="28"/>
    <line x1="119" y1="73"  x2="159" y2="106"/>
    <line x1="149" y1="28"  x2="159" y2="106"/>
    <line x1="159" y1="106" x2="178" y2="57"/>
    <line x1="159" y1="106" x2="178" y2="127"/>
    <line x1="178" y1="57"  x2="182" y2="32"/>
  </g>

  <!-- Nodes -->
  <circle cx="22"  cy="95"  r="4"  fill="url(#tg)"/>
  <circle cx="58"  cy="92"  r="13" fill="url(#tg)"/>
  <circle cx="86"  cy="36"  r="6"  fill="url(#tg)"/>
  <circle cx="112" cy="126" r="5"  fill="url(#tg)"/>
  <circle cx="119" cy="73"  r="8"  fill="url(#tg)"/>
  <circle cx="149" cy="28"  r="4"  fill="url(#tg)"/>
  <circle cx="159" cy="106" r="10" fill="url(#tg)"/>
  <circle cx="178" cy="57"  r="4"  fill="url(#tg)"/>
  <circle cx="178" cy="127" r="4"  fill="url(#tg)"/>
  <circle cx="182" cy="32"  r="3"  fill="url(#tg)"/>

  <!-- TIB -->
  <text x="198" y="97"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="62"
        textLength="95" lengthAdjust="spacingAndGlyphs"
        fill="#1B3A6B">TIB</text>

  <!-- LOGICS -->
  <text x="302" y="97"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
